<!-- Vendored, local-first (D-93/D-102): no CDN at runtime. ONE shared THREE instance —
     ESM module sets window.THREE, then the self-contained UMD bundle reads it.
     Load order is NON-NEGOTIABLE (spike 001 README, D-93): three.module.js FIRST. -->
<script type="module">
import * as THREE from './vendor/three.module.js';
import { STLLoader } from './vendor/STLLoader.js';
window.THREE = THREE;                          // UMD bundle reads window.THREE → single instance

await new Promise((resolve, reject) => {
  const s = document.createElement('script');
  s.src = './vendor/3d-force-graph.min.js';
  s.onload = resolve;
  s.onerror = () => reject(new Error('failed to load vendored 3d-force-graph.min.js'));
  document.head.appendChild(s);
});
const ForceGraph3D = window.ForceGraph3D;

// ---------- constants ----------
const TYPE_COLOR    = { entity: 0x5b8dff, fact: 0x9b8cff, schema: 0xff6b9d };
const TOMBSTONE_COLOR = 0x3a3e4a;
const HOT           = new THREE.Color(0xffe08a);   // activation glow / particle color
const MAX_FAN_OUT   = 8;
const MAX_HOPS         = 4;    // spreading-activation depth (multi-hop pathways)
const HOP_MS           = 620;  // delay between hop waves — energy propagates outward
const TRACE_FANOUT     = 5;    // max edges followed out of each node
const TRACE_MAX_EDGES  = 80;   // total pulse budget per trace

// hull mesh rotation constants (radians) — tweak if the model sits rotated
// e.g. -Math.PI/2 on X to lay it flat. Longest STL axis is Z (~208 units):
// HULL_ROT_X = -Math.PI/2 rotates that axis from pointing up to pointing forward.
const HULL_ROT_X = -Math.PI / 2;
const HULL_ROT_Y = 0;
const HULL_ROT_Z = 0;
// Brain world scale: the normalized brain (median axis spans ±1) maps to ±BRAIN_SCALE
// world units. Drives BOTH the visible shell and the containment volume, so they stay
// aligned. Bigger = roomier cloud (more space between nodes); smaller = denser.
const BRAIN_SCALE = 460;
const HOVER_SCALE = 1.8;   // node mesh scale-up while hovered
// Containment pull: how hard a node that drifts outside the brain volume is drawn back
// toward the center each tick. Higher = crisper brain edge, more surface clumping.
const CONTAIN_STRENGTH = 0.35;

// ---------- DOM refs ----------
const logEl       = document.getElementById('log');
const ncountEl    = document.getElementById('ncount');
const sseLabelEl  = document.getElementById('sse-label');
const sseDotEl    = document.getElementById('sse-dot');
const detailEl    = document.getElementById('detail');
const backdropEl  = document.getElementById('backdrop');
const tooltipEl   = document.getElementById('tooltip');
const btnTomb     = document.getElementById('btn-tombstones');
const btnTest     = document.getElementById('btn-test-trace');
const loadingEl   = document.getElementById('detail-loading');

// ---------- state ----------
let allNodes      = [];
let allLinks      = [];
let showTombstones = false;
const idMap       = new Map();   // node.id → node object
const adj         = new Map();   // node.id → array of link objects (both directions)
let selectedNode  = null;
let selectionRing = null;
let hoveredNode   = null;
let Graph;

// ---------- log ----------
const evts = [];
function logEvent(cat, msg) {
  const t = new Date().toISOString().slice(11, 23);
  evts.push({ t, cat, msg });
  logEl.textContent = evts.slice(-40).map(e => `${e.t} [${e.cat}] ${e.msg}`).join('\n');
  logEl.scrollTop = logEl.scrollHeight;
}

// Surface uncaught errors in the on-screen log (visible without devtools); dedupe the
// repeating ones so a per-frame error doesn't flood the panel.
let _lastErrMsg = '';
window.addEventListener('error', ev => {
  const m = `${ev.message || 'error'}${ev.filename ? ' @ ' + ev.filename.split('/').pop() + ':' + ev.lineno : ''}`;
  if (m === _lastErrMsg) return; _lastErrMsg = m;
  try { logEvent('error', m); } catch (_) {}
});
window.addEventListener('unhandledrejection', ev => {
  try { logEvent('error', 'promise: ' + ((ev.reason && ev.reason.message) || ev.reason)); } catch (_) {}
});

// ---------- SSE status ----------
function setSSEStatus(live) {
  sseDotEl.style.background = live ? '#5dd6a0' : '#ffd166';
  sseLabelEl.style.color    = live ? '#5dd6a0' : '#ffd166';
  sseLabelEl.textContent    = live ? 'live'    : 'reconnecting…';
}

// ---------- load /graph ----------
loadingEl.style.display = 'block';

let loadErr = null;
try {
  const res = await fetch('/graph');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  allNodes = data.nodes || [];
  allLinks = data.links || [];
} catch (err) {
  loadErr = err;
  logEvent('error', String(err));
}

loadingEl.style.display = 'none';

// ---------- brain volume occupancy grid (drives the containment force) ----------
let brainVol = null;
try {
  const vres = await fetch('./vendor/brain-volume.json');
  if (vres.ok) {
    const vj = await vres.json();
    const rawBits = atob(vj.bits);
    const bits = new Uint8Array(rawBits.length);
    for (let i = 0; i < rawBits.length; i++) bits[i] = rawBits.charCodeAt(i);
    brainVol = { res: vj.res, bits, centroid: vj.centroid, normScale: vj.normScale };
  }
} catch (e) { logEvent('warn', 'brain volume grid unavailable: ' + e.message); }

// Occupancy test in normalized brain space (each axis in [-1,1]).
function brainOccupied(qx, qy, qz) {
  if (!brainVol) return true;                  // no grid → containment is a no-op
  const R = brainVol.res;
  const ix = ((qx + 1) * 0.5 * R) | 0, iy = ((qy + 1) * 0.5 * R) | 0, iz = ((qz + 1) * 0.5 * R) | 0;
  if (ix < 0 || iy < 0 || iz < 0 || ix >= R || iy >= R || iz >= R) return false;
  const i = (iz * R + iy) * R + ix;
  return (brainVol.bits[i >> 3] >> (i & 7)) & 1;
}

// Seed initial node positions inside the brain volume so the cloud starts in-shape and
// the force layout just relaxes within it (fast convergence, no sphere→brain morph).
if (brainVol && allNodes.length) {
  const R = brainVol.res, occ = [];
  for (let i = 0; i < R * R * R; i++) if ((brainVol.bits[i >> 3] >> (i & 7)) & 1) occ.push(i);
  const seedEuler = new THREE.Euler(HULL_ROT_X, HULL_ROT_Y, HULL_ROT_Z);
  const sp = new THREE.Vector3();
  for (const n of allNodes) {
    const c = occ.length ? occ[(Math.random() * occ.length) | 0] : 0;
    const ix = c % R, iy = ((c / R) | 0) % R, iz = (c / (R * R)) | 0;
    const qx = (ix + Math.random()) / R * 2 - 1;
    const qy = (iy + Math.random()) / R * 2 - 1;
    const qz = (iz + Math.random()) / R * 2 - 1;
    sp.set(qx, qy, qz).multiplyScalar(BRAIN_SCALE).applyEuler(seedEuler);
    n.x = sp.x; n.y = sp.y; n.z = sp.z;
  }
}

if (loadErr) {
  const p = document.createElement('p');
  p.style.cssText = 'color:#ffd166;font-size:11px;margin:8px 0 0';
  p.textContent   = 'Could not read memory graph — verify brain-memory is installed and the database path is correct.';
  document.getElementById('panel').appendChild(p);
} else if (allNodes.length === 0) {
  const h = document.createElement('p');
  h.style.cssText  = 'color:#e6ebf5;font-size:13px;font-weight:500;margin:8px 0 4px';
  h.textContent    = 'No memory nodes yet';
  const b = document.createElement('p');
  b.style.cssText  = 'color:#8a93a8;font-size:11px;margin:0';
  b.textContent    = 'Run `brain recall` or send a Telegram message to build your memory graph.';
  document.getElementById('panel').appendChild(h);
  document.getElementById('panel').appendChild(b);
}

// ---------- idMap + adjacency (BEFORE ForceGraph3D mutates link.source/target) ----------
for (const n of allNodes) idMap.set(n.id, n);
for (const n of allNodes) adj.set(n.id, []);
for (const l of allLinks) {
  const src = typeof l.source === 'object' ? l.source.id : l.source;
  const dst = typeof l.target === 'object' ? l.target.id : l.target;
  if (adj.has(src)) adj.get(src).push(l);
  if (adj.has(dst)) adj.get(dst).push({ source: dst, target: src, _mirror: l, rel: l.rel, w: l.w, kind: l.kind });
}

ncountEl.textContent = String(allNodes.length);
if (!loadErr) logEvent('init', `graph loaded: ${allNodes.length} nodes / ${allLinks.length} edges`);

// ---------- spreading-activation pulses (slow electric energy traveling node → node) ----------
const PULSE_MS = 1500;                              // slow — the pathway fills with light over this time
const pulses = [];                                 // {from, to, t0, mesh}
const _pulseGeo = new THREE.CylinderGeometry(1.5, 1.5, 1, 6, 1);   // glowing "wire" along +Y, scaled per edge
const _pa = new THREE.Vector3(), _pb = new THREE.Vector3(), _ptip = new THREE.Vector3();
const _pmid = new THREE.Vector3(), _pdir = new THREE.Vector3(), _pup = new THREE.Vector3(0, 1, 0);
let pulseGroup = null;                              // created after Graph init (needs the scene)
function spawnPulse(from, to) {
  if (!pulseGroup || !from || !to) return;
  const mat = new THREE.MeshBasicMaterial({ color: 0x9fd8ff, transparent: true, opacity: 0,
    depthWrite: false });   // normal blending — overlaps don't stack to blown-out white
  const mesh = new THREE.Mesh(_pulseGeo, mat);
  pulseGroup.add(mesh);
  pulses.push({ from, to, t0: performance.now(), mesh });
}

// ---------- rAF activation loop ----------
// Touches ONLY active set — never all nodes, no per-frame full refresh (perf trap D-93).
const active = new Set();

function activate(node, level) {
  if (!node || !node.__mat) return;   // node not rendered (tombstone hidden or not yet initialized)
  node.__act = Math.max(node.__act, level);
  active.add(node);
}

function resolve(x) { return typeof x === 'object' ? x : idMap.get(x); }

let last = performance.now();
function tick(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  for (const node of [...active]) {
    if (!node.__mat || !node.__mesh) { active.delete(node); continue; }
    node.__act -= dt * 0.6;                              // ~1.6s decay
    if (node.__act <= 0.001) { node.__act = 0; active.delete(node); continue; }
    const a = Math.max(0, node.__act) * (node.__actGain || 1);
    node.__mat.color.copy(node.__base).lerp(HOT, a * 0.8);
    node.__mat.opacity = Math.min(1, node.__baseOp + a * 0.4);   // boost from each node's own base, not a jump to full
    node.__mesh.scale.setScalar(1 + a * 0.35);          // subtle glow — the pathway light carries the signal
  }
  // advance traveling pulses (sample live node positions so they track the layout)
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    const k = (now - p.t0) / PULSE_MS;
    if (k >= 1) { pulseGroup.remove(p.mesh); p.mesh.material.dispose(); pulses.splice(i, 1); continue; }
    // the lit segment sweeps from source toward dest, filling the pathway with light
    _pa.set(p.from.x || 0, p.from.y || 0, p.from.z || 0);
    _pb.set(p.to.x || 0, p.to.y || 0, p.to.z || 0);
    const grow = Math.min(1, k * 1.7);
    _ptip.copy(_pb).sub(_pa).multiplyScalar(grow).add(_pa);
    const len = _pa.distanceTo(_ptip);
    _pmid.copy(_pa).add(_ptip).multiplyScalar(0.5);
    p.mesh.position.copy(_pmid);
    _pdir.copy(_ptip).sub(_pa);
    if (len > 1e-4) { _pdir.multiplyScalar(1 / len); p.mesh.quaternion.setFromUnitVectors(_pup, _pdir); }
    p.mesh.scale.set(1, Math.max(0.01, len), 1);
    const fade = k < 0.55 ? 1 : Math.max(0, 1 - (k - 0.55) / 0.45);    // hold lit, then fade the whole wire
    p.mesh.material.opacity = 0.5 * fade;                              // hazed, not glaring
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ---------- applyTrace — multi-hop spreading activation as slow electric pulses (D-102) ----------
// Same function for SSE + local triggers. BFS outward from the seeds; each hop wave sends a
// slow glowing pulse traveling node→node along its edges, lighting the destination as it lands.
// The pathway is revealed through the LOD for the trace's duration, then fades back.
function applyTrace(seedIds) {
  logEvent('spreading activation', `seeds=[${seedIds.slice(0, 4).join(',')}${seedIds.length > 4 ? '…' : ''}]`);
  const visited = new Set();
  const seeds = [];
  for (const sid of seedIds) {
    const s = idMap.get(sid);
    if (s && !visited.has(sid)) { visited.add(sid); seeds.push(s); }
  }
  if (!seeds.length) return;

  // BFS into hop-ordered waves of edges
  const waves = [];
  let frontier = seeds, budget = TRACE_MAX_EDGES;
  for (let hop = 1; hop <= MAX_HOPS && frontier.length && budget > 0; hop++) {
    const wave = [], next = [];
    for (const node of frontier) {
      for (const edge of (adj.get(node.id) || []).slice(0, TRACE_FANOUT)) {
        const nb = resolve(edge.target);
        if (!nb || visited.has(nb.id)) continue;
        if (budget-- <= 0) break;
        visited.add(nb.id);
        wave.push({ edge, from: node, to: nb });
        next.push(nb);
      }
    }
    if (wave.length) waves.push(wave);
    frontier = next;
  }

  // reveal the whole pathway through the LOD up front (one visibility re-apply), light the seeds
  seeds.forEach(s => traceNodes.add(s.id));
  for (const wave of waves) for (const { edge, to } of wave) { traceNodes.add(to.id); traceLinks.add(linkKey(edge)); }
  revealTrace();
  seeds.forEach(s => activate(s, 1.0));

  // animate the pulses hop by hop — energy propagates outward
  waves.forEach((wave, h) => {
    const intensity = Math.max(0.3, 1 - (h + 1) * 0.18);
    setTimeout(() => {
      wave.forEach(({ from, to }, i) => setTimeout(() => {
        spawnPulse(from, to);                                       // the pathway lights up, source → dest
        setTimeout(() => activate(to, intensity), PULSE_MS * 0.6);  // light the node as the light reaches it
      }, i * 35));
    }, h * HOP_MS);
  });

  // fade the revealed pathway back into the LOD once the pulses finish
  setTimeout(() => { traceNodes.clear(); traceLinks.clear(); revealTrace(); }, waves.length * HOP_MS + 2800);
}

// ---------- LOD classification: the engine's schema hierarchy IS the clustering ----------
// `abstracts` edges go schema → member. Overview shows schema super-nodes (sized by how many
// memories they abstract) over a faint haze of unconsolidated (un-abstracted) memory; clicking
// a schema reveals the memories it abstracts. Scales: overview stays ~#schemas regardless of N.
const schemaMembers = new Map();   // schemaId  -> Set(memberId)
const memberSchema  = new Map();   // memberId  -> schemaId
for (const l of allLinks) {
  if (l.kind !== 'abstracts') continue;
  const s = typeof l.source === 'object' ? l.source.id : l.source;
  const m = typeof l.target === 'object' ? l.target.id : l.target;
  if (!schemaMembers.has(s)) schemaMembers.set(s, new Set());
  schemaMembers.get(s).add(m);
  if (!memberSchema.has(m)) memberSchema.set(m, s);
}
for (const n of allNodes) {
  if (n.type === 'schema')           { n.__cat = 'schema'; n.__members = (schemaMembers.get(n.id) || new Set()).size; }
  else if (memberSchema.has(n.id))   { n.__cat = 'member'; n.__schemaId = memberSchema.get(n.id); }
  else                               { n.__cat = 'haze'; }
}
const expanded   = new Set(); // schemaIds currently drilled-in
const traceNodes = new Set(); // node ids temporarily lit by an active trace (revealed through the LOD)
const traceLinks = new Set(); // link keys temporarily lit by an active trace
const linkKey = l => {
  const s = typeof l.source === 'object' ? l.source.id : l.source;
  const t = typeof l.target === 'object' ? l.target.id : l.target;
  return s < t ? s + '' + t : t + '' + s;
};
const nodeVisible = n => !!n && (n.__cat !== 'member' || expanded.has(n.__schemaId) || traceNodes.has(n.id));
const linkVis = l => {
  if (traceLinks.has(linkKey(l))) return true;                   // active trace pathway always shows
  const sid = typeof l.source === 'object' ? l.source.id : l.source;
  const tid = typeof l.target === 'object' ? l.target.id : l.target;
  if (l.kind === 'abstracts') return expanded.has(sid);          // schema→member: only when drilled in
  return nodeVisible(idMap.get(sid)) && nodeVisible(idMap.get(tid)) &&
    (expanded.has(memberSchema.get(sid)) || expanded.has(memberSchema.get(tid)));
};
function revealTrace() { Graph.nodeVisibility(nodeVisible); Graph.linkVisibility(linkVis); }

// ---------- nodeThreeObject factory (cached so Graph.refresh() reuses meshes) ----------
function makeNodeObject(node) {
  if (node.__mesh) return node.__mesh;
  const isTomb = !!node.tombstoned;
  let r, op;
  if (node.__cat === 'schema')    { const m = node.__members || 0; r = 1.3 + Math.sqrt(m) * 1.5; op = 0.38 + Math.min(m, 12) * 0.025; }
  else if (node.__cat === 'haze') { r = 1.1 + node.s * 1.3;                          op = 0.45; }
  else                            { r = 1.1 + node.s * 2;                            op = 0.85; }
  const base  = isTomb ? new THREE.Color(TOMBSTONE_COLOR) : new THREE.Color(TYPE_COLOR[node.type] || TYPE_COLOR.entity);
  const mat   = new THREE.MeshBasicMaterial({ color: base.clone(), transparent: true, opacity: isTomb ? 0.4 : op });
  node.__base  = base;
  node.__mat   = mat;
  node.__act   = 0;
  node.__baseOp  = isTomb ? 0.4 : op;
  node.__actGain = node.__cat === 'schema' ? 0.4 : 1;   // schemas are already prominent — dampen their blink
  const mesh   = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 8), mat);
  node.__mesh  = mesh;
  node.__baseR = r;
  return mesh;
}

function getVisibleNodes() {
  return showTombstones ? allNodes : allNodes.filter(n => !n.tombstoned);
}

// ---------- 3d-force-graph init ----------
Graph = ForceGraph3D()(document.getElementById('graph'))
  .backgroundColor('#06070d')
  .graphData({ nodes: getVisibleNodes(), links: allLinks })
  .nodeRelSize(4)
  .nodeThreeObject(makeNodeObject)
  .nodeVisibility(nodeVisible)
  .linkVisibility(linkVis)
  .linkColor(() => 'rgba(120,140,190,0.6)')
  .linkWidth(1.2)
  .linkDirectionalParticleColor(() => '#aef0ff')   // electric blue-white energy
  .linkDirectionalParticleWidth(3)
  .linkDirectionalParticleSpeed(0.005)             // slow-moving pulse, node → node
  .onNodeClick(node => {
    if (node.__cat === 'schema') {            // drill into / out of a schema cluster
      if (expanded.has(node.id)) expanded.delete(node.id); else expanded.add(node.id);
      Graph.refresh();
    } else {
      selectNode(node);
    }
  })
  .onNodeHover(node => {
    // Restore previous hovered node's base opacity + scale
    if (hoveredNode && hoveredNode.__mat) {
      hoveredNode.__mat.opacity = hoveredNode.tombstoned ? 0.45 : 0.78;
      if (hoveredNode.__mesh) hoveredNode.__mesh.scale.setScalar(1);
    }
    hoveredNode = node || null;
    if (node) {
      if (node.__mat) node.__mat.opacity = 1.0;
      if (node.__mesh) node.__mesh.scale.setScalar(HOVER_SCALE);
      tooltipEl.style.display = 'block';
      const typeLabel = node.tombstoned ? 'tombstone' : (node.type || 'entity');
      tooltipEl.textContent = `${typeLabel} · ${(node.value || '').slice(0, 50)}`;
    } else {
      tooltipEl.style.display = 'none';
    }
  });

// ---------- tighten force layout (reduce repulsion + shorten links) ----------
const chargeForce = Graph.d3Force('charge');
if (chargeForce) chargeForce.strength(-15);
const linkForce = Graph.d3Force('link');
if (linkForce) linkForce.distance(l => l.kind === 'abstracts' ? 16 : 22);  // enough spacing for visible pulse travel
Graph.d3ReheatSimulation();

// ---------- real brain mesh hull (CC BY-SA, Nevit Dilmen) ----------
// Decorative translucent shell — no anatomical claims, no data wired to it.
// Loaded from vendored STL; lit material so surface detail reads.
const hullGroup = new THREE.Group();
hullGroup.rotation.set(HULL_ROT_X, HULL_ROT_Y, HULL_ROT_Z);
hullGroup.scale.setScalar(BRAIN_SCALE);   // normalized brain → world; matches containment
Graph.scene().add(hullGroup);
pulseGroup = new THREE.Group();           // holds the traveling activation pulses
Graph.scene().add(pulseGroup);

new STLLoader().load('./vendor/brain-model.stl', (geometry) => {
  // Normalize IDENTICALLY to the occupancy grid (vendor/brain-volume.json): recenter on
  // the baked vertex centroid, then scale by the baked normScale so the median axis spans
  // [-1,1]. This makes the visible shell and the containment volume share one coordinate
  // space — the node cloud fills exactly the brain you see.
  if (brainVol) {
    const c = brainVol.centroid, s = brainVol.normScale;
    geometry.translate(-c[0], -c[1], -c[2]);
    geometry.scale(s, s, s);
  } else {
    geometry.center();
  }
  geometry.computeVertexNormals(); // smooth shading so surface detail reads

  const hullMat = new THREE.MeshStandardMaterial({
    color: 0x7a8db5,      // muted blue-grey, coherent with panel chrome palette
    transparent: true,
    opacity: 0.14,        // very subtle; nudge 0.10–0.20 to taste
    roughness: 0.9,
    metalness: 0,
    side: THREE.DoubleSide,
    depthWrite: false,    // never occludes nodes
  });

  const hullMesh = new THREE.Mesh(geometry, hullMat);
  hullMesh.renderOrder = -1;  // render before nodes (default renderOrder 0) so nodes stay on top
  hullGroup.add(hullMesh);
});

// ---------- brain containment force ----------
// Confine the force-directed cloud into the brain volume: clusters still form (charge +
// links), but any node that drifts OUTSIDE the baked occupancy grid is pulled back toward
// the brain center each tick — so the whole cloud takes the brain shape while keeping
// its cluster structure. The shell tracks the cloud centroid so model + nodes stay
// co-located, and its world matrix IS the world→normalized map the occupancy test uses.
// Applied via onEngineTick, NOT Graph.d3Force(name, fn): the two-arg d3Force SETTER
// re-digests 3d-force-graph and nulls its internal `layout` mid-animation, which throws
// "Cannot read properties of undefined (reading 'tick')" and blanks the canvas. onEngineTick
// runs each simulation tick without touching force registration.
const _inv = new THREE.Matrix4();
const _q = new THREE.Vector3();
function brainContainment() {
  const nodes = Graph.graphData().nodes;
  if (!brainVol || !nodes.length) return;
  let cx = 0, cy = 0, cz = 0;
  for (const n of nodes) { cx += n.x || 0; cy += n.y || 0; cz += n.z || 0; }
  cx /= nodes.length; cy /= nodes.length; cz /= nodes.length;
  hullGroup.position.set(cx, cy, cz);
  hullGroup.updateMatrixWorld(true);
  _inv.copy(hullGroup.matrixWorld).invert();   // world → normalized brain space
  for (const n of nodes) {
    _q.set(n.x || 0, n.y || 0, n.z || 0).applyMatrix4(_inv);
    if (!brainOccupied(_q.x, _q.y, _q.z)) {
      n.vx = (n.vx || 0) + (cx - (n.x || 0)) * CONTAIN_STRENGTH;
      n.vy = (n.vy || 0) + (cy - (n.y || 0)) * CONTAIN_STRENGTH;
      n.vz = (n.vz || 0) + (cz - (n.z || 0)) * CONTAIN_STRENGTH;
    }
  }
}
Graph.onEngineTick(brainContainment);
Graph.d3ReheatSimulation();

// Frame the camera on the brain-scaled cloud. The cloud is now fixed at BRAIN_SCALE
// (not the library's default natural size), so set an explicit distance that shows the
// whole brain + stem instead of relying on 3d-force-graph's default camera.
Graph.cameraPosition({ x: 0, y: 0, z: BRAIN_SCALE * 3.1 });

// ---------- settle behind a hidden canvas, then freeze + fade in (no load-time shuffle) ----------
// Let the force layout settle while the canvas is invisible; on first engine stop, PIN every node
// at its settled position (fx/fy/fz) so the graph is static from the moment it appears and never
// reshuffles (on tombstone toggle, schema expand, etc.), then fade it in.
Graph.cooldownTicks(120);
const graphEl = document.getElementById('graph');
graphEl.style.opacity = '0';   // hide INSTANTLY (no transition yet → no fade-out flash)
let _settled = false;
function revealSettled() {
  if (_settled) return;
  _settled = true;
  for (const n of allNodes) { if (n.x != null) { n.fx = n.x; n.fy = n.y; n.fz = n.z; } }
  graphEl.style.transition = 'opacity 0.5s ease';   // add transition ONLY now → fades in, never out
  graphEl.style.opacity = '1';
}
Graph.onEngineStop(revealSettled);
setTimeout(revealSettled, 5000);   // safety: reveal even if the engine never reports a stop

// Tooltip follows cursor
document.addEventListener('mousemove', e => {
  tooltipEl.style.left = (e.clientX + 12) + 'px';
  tooltipEl.style.top  = (e.clientY + 12) + 'px';
});

// ---------- tombstone toggle ----------
btnTomb.addEventListener('click', () => {
  showTombstones = !showTombstones;
  btnTomb.textContent = showTombstones ? 'Hide tombstones' : 'Show tombstones';
  Graph.graphData({ nodes: getVisibleNodes(), links: allLinks });
  ncountEl.textContent = String(getVisibleNodes().length);
  logEvent('toggle', showTombstones ? 'tombstones shown' : 'tombstones hidden');
});

// ---------- test trace (local trigger — D-102 proof: same applyTrace as SSE) ----------
btnTest.addEventListener('click', () => {
  const visible = getVisibleNodes();
  if (!visible.length) return;
  // pick the best-connected seeds so the spreading pathways are actually visible
  const connected = visible.filter(n => (adj.get(n.id) || []).length > 0)
                           .sort((a, b) => (adj.get(b.id).length) - (adj.get(a.id).length));
  const seeds = (connected.length ? connected : visible).slice(0, 2).map(n => n.id);
  applyTrace(seeds);
});

// ---------- SSE live-tail — calls same applyTrace as local trigger ----------
const es = new EventSource('/events');
es.onopen  = () => { setSSEStatus(true);  logEvent('sse', 'connected'); };
es.onerror = () => { setSSEStatus(false); logEvent('sse', 'error/retry'); };
es.addEventListener('trace', ev => {
  const row = JSON.parse(ev.data);
  logEvent('sse-trace', `#${row.id} seeds=[${(row.seeds || []).join(',')}]`);
  applyTrace(row.seeds || []);
});

// ---------- node detail panel ----------

function closeDetail() {
  detailEl.style.display  = 'none';
  backdropEl.style.display = 'none';
  clearSelection();
}

function clearSelection() {
  if (selectedNode && selectionRing) {
    if (selectedNode.__mesh) selectedNode.__mesh.remove(selectionRing);
    if (selectionRing.geometry) selectionRing.geometry.dispose();
    if (selectionRing.material) selectionRing.material.dispose();
  }
  selectedNode  = null;
  selectionRing = null;
}

function selectNode(node) {
  clearSelection();
  if (!node) return;
  selectedNode = node;

  // White selection ring — added as child of the node mesh so it tracks the node
  if (node.__mesh && node.__baseR) {
    const r = node.__baseR;
    const ringGeo = new THREE.RingGeometry(r * 1.4, r * 1.7, 32);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0xffffff, transparent: true, opacity: 0.9, side: THREE.DoubleSide
    });
    selectionRing = new THREE.Mesh(ringGeo, ringMat);
    node.__mesh.add(selectionRing);
  }

  populateDetail(node);
  detailEl.style.display   = 'block';
  backdropEl.style.display = 'block';
}

function populateDetail(node) {
  // Title — textContent only, never innerHTML with raw value (T-10-12)
  document.getElementById('detail-title').textContent = (node.value || '').slice(0, 80);

  // Metadata block (all via DOM, no innerHTML with data)
  const metaEl = document.getElementById('detail-meta');
  metaEl.innerHTML = '';
  const tombVal = node.tombstoned ? String(node.tombstoned) : '—';
  const fields = [
    ['type',       node.tombstoned ? 'tombstone' : (node.type || '—')],
    ['strength',   typeof node.s === 'number' ? node.s.toFixed(2) : '—'],
    ['confidence', typeof node.c === 'number' ? node.c.toFixed(2) : '—'],
    ['origin',     node.origin || '—'],
    ['tombstone',  tombVal],
  ];
  for (const [key, val] of fields) {
    const row = document.createElement('div');
    row.className = 'meta-row';
    const k = document.createElement('span');
    k.className   = 'meta-key';
    k.textContent = key;
    const v = document.createElement('span');
    v.className   = 'meta-val';
    v.textContent = val;
    row.appendChild(k);
    row.appendChild(v);
    metaEl.appendChild(row);
  }

  // Body text (full value, textContent only)
  document.getElementById('detail-body').textContent = node.value || '';

  // Connections section
  const connsEl  = document.getElementById('detail-conns');
  const moreEl   = document.getElementById('detail-conns-more');
  connsEl.innerHTML = '';
  moreEl.textContent = '';

  const nodeId   = node.id;
  const seen     = new Set();
  const neighbors = [];
  for (const edge of (adj.get(nodeId) || [])) {
    const nbId = typeof edge.target === 'object' ? edge.target.id : edge.target;
    if (nbId && nbId !== nodeId && !seen.has(nbId)) {
      seen.add(nbId);
      const nb = idMap.get(nbId);
      if (nb) neighbors.push(nb);
    }
  }

  if (neighbors.length === 0) {
    const noConns = document.createElement('div');
    noConns.style.cssText = 'font-size:11px;color:#8a93a8';
    noConns.textContent   = 'No direct connections';
    connsEl.appendChild(noConns);
  } else {
    const visible = neighbors.slice(0, MAX_FAN_OUT);
    const extra   = neighbors.length - MAX_FAN_OUT;
    for (const nb of visible) {
      const span = document.createElement('span');
      span.className = 'conn-link';
      span.setAttribute('role', 'button');
      span.setAttribute('tabindex', '0');
      span.textContent = '[[' + (nb.value || nb.id).slice(0, 40) + ']]';
      span.addEventListener('click', () => selectNode(nb));
      span.addEventListener('keydown', e => { if (e.key === 'Enter') selectNode(nb); });
      connsEl.appendChild(span);
    }
    if (extra > 0) {
      moreEl.textContent = `+ ${extra} more`;
    }
  }
}

// Close button
document.getElementById('detail-close').addEventListener('click', closeDetail);

// Backdrop click dismisses detail
backdropEl.addEventListener('click', closeDetail);

// Escape key dismisses detail
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && detailEl.style.display !== 'none') closeDetail();
});
</script>
</body>
</html>
