<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>recense · activations</title>
<!-- import map MUST be the first script element in <head> —
     precedes every module script element (Pitfall 1: non-negotiable).
     Maps the 'three' bare specifier so vendored addon ESM files resolve locally. -->
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.js"
  }
}
</script>
<link rel="stylesheet" href="./css/styles.css" />
<!-- Single module entry point — all app logic lives in modules/app.js and its imports.
     No inline JS here: window.THREE assignment and UMD injection are in app.js (Plan 07). -->
<script type="module" src="./modules/app.js"></script>
</head>
<body>

<!-- The WebGL canvas host — fixed full-bleed, opacity:0 until the layout settles -->
<div id="graph"></div>

<!-- Control strip / status surface — styled to recede by default (D-13) -->
<div id="panel">
  <div class="row status-row">
    <span id="sse-dot"></span>
    <span id="sse-label" class="lbl">connecting…</span>
    <span class="count-wrap"><span class="sep">·</span>
      <span id="ncount" class="stat">—</span> <span class="lbl">nodes</span></span>
  </div>
  <div class="row actions-row">
    <button id="btn-tombstones">Show tombstones</button>
    <button id="btn-reader" class="btn-sm">Reader</button>
    <!-- Corpus graph swap (READER-04 / D-07): expanded Brain Window only.
         CSS gate: `#btn-corpus { display:none }` / `.mode-window #btn-corpus { display:inline-flex }` -->
    <button id="btn-corpus" class="btn-sm">Corpus</button>
    <button id="btn-log" class="btn-sm">Log</button>
    <!-- Temporary: manual trace trigger for design verification (handler in trace.js) -->
    <button id="btn-test-trace" class="btn-sm">Test trace</button>
  </div>
  <div id="detail-loading">Initializing graph…</div>
  <!-- Search affordance — full-window only (D-03 / VIZ-07); CSS gates via .mode-window -->
  <div id="search-wrap">
    <div style="position:relative">
      <input id="search-input" type="search" autocomplete="off"
             placeholder="search nodes…" aria-label="Search nodes" />
      <button id="search-clear" type="button" aria-label="Clear search"
              style="display:none">×</button>
    </div>
    <div id="search-count" aria-live="polite"></div>
    <!-- Incremental candidate list (VIZ-07 exploration) — populated as you type -->
    <div id="search-results" role="listbox" aria-label="Search results"></div>
  </div>
  <!-- Topic browser — full-window only; broad entry point (VIZ-08 exploration) -->
  <div id="topic-wrap">
    <div id="topic-header">topics</div>
    <div id="topic-list" role="listbox" aria-label="Topics"></div>
  </div>
  <!-- Event log: hidden by default, demoted to toggle (D-14) -->
  <div id="log"></div>
</div>

<!-- Node type legend — discrete, bottom-left (founder, 2026-06-12) -->
<div class="legend">
  <span class="dot dot-entity">●</span> entity&nbsp;
  <span class="dot dot-fact">●</span> fact&nbsp;
  <span class="dot dot-schema">●</span> schema
</div>

<!-- Recenter camera control (quick-260612-v79) — top-level, OUTSIDE #panel so
     the compact `#panel { display:none }` rule never hides it. Inline crosshair
     SVG: no font dependency, no external URL. -->
<button id="btn-recenter" type="button" aria-label="Recenter camera" title="Recenter">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <circle cx="12" cy="12" r="5" />
    <line x1="12" y1="1" x2="12" y2="5" />
    <line x1="12" y1="19" x2="12" y2="23" />
    <line x1="1" y1="12" x2="5" y2="12" />
    <line x1="19" y1="12" x2="23" y2="12" />
  </svg>
</button>

<!-- Tap-to-dismiss layer behind the detail panel -->
<div id="backdrop"></div>

<!-- Node detail panel: right-edge slide-in, hidden by default (D-15) -->
<div id="detail">
  <button id="detail-close" aria-label="Close node detail">×</button>
  <div id="detail-title"></div>
  <div class="meta-grid" id="detail-meta"></div>
  <hr class="divider" />
  <div id="detail-body"></div>
  <hr class="divider" />
  <div id="detail-conns-head">Connections</div>
  <div id="detail-conns"></div>
  <div id="detail-conns-more"></div>
</div>

<!-- Reader overlay (slice): generated project deep-dive; inline fact-refs select graph atoms -->
<div id="reader">
  <div id="reader-head">
    <button id="reader-close" type="button" aria-label="Close reader" title="Close reader">×</button>
    <span id="reader-kicker">deep-dive ·</span> <span id="reader-title"></span>
  </div>
  <div id="reader-body"></div>
</div>

<!-- Floating hover tooltip -->
<div id="tooltip"></div>

<!-- CC BY-SA attribution required by brain-model.CREDITS.txt — must remain visible -->
<div id="hull-credit">brain model: Nevit Dilmen · CC BY-SA 3.0</div>

</body>
</html>
