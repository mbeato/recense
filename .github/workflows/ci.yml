name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15]
        node: [22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # better-sqlite3 node-gyp requires python setuptools on both platforms
      - if: ${{ startsWith(matrix.os, 'ubuntu') }}
        name: Install python setuptools (Ubuntu)
        run: python3 -m pip install setuptools

      - if: ${{ startsWith(matrix.os, 'macos') }}
        name: Install python setuptools (macOS)
        run: brew install python-setuptools

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Smoke: verify brain doctor RUNS without crashing.
      # Exits 1 (no keys/DB in CI) — that is expected. But the process MUST emit
      # "brain doctor:" output before exiting; a silent crash would not.
      # L-10: assert output contains the expected header, not just `|| true`.
      - name: Smoke — brain doctor runs without crashing
        run: |
          BRAIN_MEMORY_DB=:memory: node dist/src/adapter/brain.js doctor > /tmp/doctor-out.txt 2>&1 || true
          grep -q "brain doctor:" /tmp/doctor-out.txt
