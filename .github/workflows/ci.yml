name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15]
        node: [22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # better-sqlite3 node-gyp requires python setuptools on both platforms
      - if: ${{ startsWith(matrix.os, 'ubuntu') }}
        name: Install python setuptools (Ubuntu)
        run: python3 -m pip install setuptools

      - if: ${{ startsWith(matrix.os, 'macos') }}
        name: Install python setuptools (macOS)
        run: brew install python-setuptools

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Smoke: verify recense doctor RUNS without crashing.
      # Exits 1 (no keys/DB in CI) — that is expected. But the process MUST emit
      # "recense doctor:" output before exiting; a silent crash would not.
      # L-10: assert output contains the expected header, not just `|| true`.
      - name: Smoke — recense doctor runs without crashing
        run: |
          RECENSE_DB=:memory: node dist/src/adapter/recense.js doctor > /tmp/doctor-out.txt 2>&1 || true
          grep -q "recense doctor:" /tmp/doctor-out.txt

      # Smoke: eval harness smoke tests — MockModelProvider wiring, zero API calls.
      # These tests run as part of `npm test` (full vitest glob) but are also named
      # here explicitly to surface eval-harness failures distinctly in CI.
      - name: Smoke — eval harness smoke tests (mocked providers, zero API calls)
        run: npx vitest run tests/eval-harness-smoke.test.ts tests/correctness-harness-smoke.test.ts

      # Smoke: eval harness dry-runs — zero API, uses committed fixtures only.
      # Verifies harnesses load dist/ correctly and CLI flags work without spend.
      - name: Typecheck — apps/tray
        run: cd apps/tray && npm ci && npx tsc --noEmit

      - name: Smoke — eval harness dry-runs (zero API)
        run: |
          node scripts/eval/correctness-harness.cjs --dry-run
          node scripts/eval/longmemeval-harness.cjs --dry-run --eval scripts/eval/fixtures/longmemeval-mini.jsonl
